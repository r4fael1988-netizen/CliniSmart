<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 80" width="320" height="80" fill="none">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0891B2;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0E7490;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="iconGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#22D3EE;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#06B6D4;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="sparkGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#34D399;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#10B981;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Icon container: rounded square -->
  <rect x="4" y="4" width="72" height="72" rx="18" ry="18" fill="url(#bgGrad)" />

  <!-- Medical cross (white) -->
  <rect x="33" y="20" width="14" height="40" rx="4" fill="white" opacity="0.95"/>
  <rect x="20" y="33" width="40" height="14" rx="4" fill="white" opacity="0.95"/>

  <!-- AI spark / pulse dot (top-right of icon) -->
  <circle cx="66" cy="14" r="7" fill="url(#sparkGrad)" />
  <path d="M63 14 L65 11 L66 14 L68 12 L66.5 14 L68 17 L66 15 L64 17 L65.5 14 Z" fill="white" opacity="0.9" />

  <!-- Text: "Clini" -->
  <text x="90" y="38" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="28" font-weight="400" fill="#1E293B" letter-spacing="-0.5">Clini</text>

  <!-- Text: "Smart" (bold, colored) -->
  <text x="144" y="38" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="28" font-weight="700" fill="#0891B2" letter-spacing="-0.5">Smart</text>

  <!-- Tagline -->
  <text x="91" y="58" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="11.5" font-weight="400" fill="#64748B" letter-spacing="0.8">RECEPÇÃO INTELIGENTE PARA CLÍNICAS</text>

  <!-- Subtle underline accent -->
  <rect x="90" y="62" width="220" height="2" rx="1" fill="url(#bgGrad)" opacity="0.25"/>
</svg>
